version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tracker-postgres
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: trackerpassword
      POSTGRES_DB: trackerdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
